services:

  # ── API Python (FastAPI + Agentes) ────────────────────────────────────────
  python-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ads-agent-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8000:8000"
    networks:
      - ads-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Dashboard React (Nginx) ───────────────────────────────────────────────
  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://31.97.170.137:8000
        VITE_API_KEY: impulsiona-agente-ads-2026-seguro
        VITE_SHEETS_URL: ""
    container_name: ads-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - ads-network
    depends_on:
      - python-api

  # N8N não é gerenciado aqui — use o N8N já instalado na VPS.
  # Os workflows ficam em ./n8n/ para importação manual.

networks:
  ads-network:
    driver: bridge
