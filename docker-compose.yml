services:

  # ── API Python (FastAPI + Agentes) ────────────────────────────────────────
  python-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ads-agent-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - ads-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # N8N não é gerenciado aqui — use o N8N já instalado na VPS.
  # Os workflows ficam em ./n8n/ para importação manual.

networks:
  ads-network:
    driver: bridge
